services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: space
      POSTGRES_PASSWORD: space
      POSTGRES_DB: space_monitor
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U space -d space_monitor"]
      interval: 5s
      retries: 5

  ingestion:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_DATABASE_URL: postgresql://space:space@db:5432/space_monitor
      APP_LOG_LEVEL: ${APP_LOG_LEVEL:-INFO}
      APP_NOMINATIM_USER_AGENT: "SpaceMonitor/1.0 (anthonyrakowski1@gmail.com)"
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile.api
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_DATABASE_URL: postgresql://space:space@db:5432/space_monitor
      APP_LOG_LEVEL: ${APP_LOG_LEVEL:-INFO}
    ports:
      - "8000:8000"
    restart: unless-stopped

  # -- profil prod: frontend przez Nginx --
  frontend:
    profiles: [prod]
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

  # -- profil test: testy jednostkowe --
  tests:
    profiles: [test]
    build: .
    command: pytest -v
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_DATABASE_URL: postgresql://space:space@db:5432/space_monitor
      APP_LOG_LEVEL: WARNING

  # -- profil test: testy wydajnosciowe --
  locust:
    profiles: [test]
    build: .
    command: locust -f tests/locustfile.py --host=http://backend:8000
    ports:
      - "8089:8089"
    depends_on:
      - backend

volumes:
  pgdata:
